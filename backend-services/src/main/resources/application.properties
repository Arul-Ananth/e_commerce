spring.config.import=optional:file:./secrets.properties

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ecommerce_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# Payments
app.payment.gateway=${APP_PAYMENT_GATEWAY:stripe}
app.payment.default-currency=${APP_PAYMENT_DEFAULT_CURRENCY:usd}

# CORS (comma-separated list)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Media
app.media.upload-dir=${APP_MEDIA_UPLOAD_DIR:C:/Dev/e_commerce/imageResource/}
app.media.resource-location=${APP_MEDIA_RESOURCE_LOCATION:file:///C:/Dev/e_commerce/imageResource/}
app.media.public-base-url=${APP_MEDIA_PUBLIC_BASE_URL:http://localhost:8080/images/}
app.media.max-upload-bytes=${APP_MEDIA_MAX_UPLOAD_BYTES:5242880}

# Stripe
app.stripe.secret-key=${APP_STRIPE_SECRET_KEY:}
app.stripe.publishable-key=${APP_STRIPE_PUBLISHABLE_KEY:}
app.stripe.webhook-secret=${APP_STRIPE_WEBHOOK_SECRET:}
app.stripe.api-base-url=${APP_STRIPE_API_BASE_URL:https://api.stripe.com/v1}
app.stripe.success-url=${APP_STRIPE_SUCCESS_URL:http://localhost:5173/checkout/success}
app.stripe.cancel-url=${APP_STRIPE_CANCEL_URL:http://localhost:5173/checkout/cancel}
app.stripe.currency=${APP_STRIPE_CURRENCY:usd}
app.stripe.connect-timeout-ms=${APP_STRIPE_CONNECT_TIMEOUT_MS:3000}
app.stripe.read-timeout-ms=${APP_STRIPE_READ_TIMEOUT_MS:10000}
app.stripe.max-attempts=${APP_STRIPE_MAX_ATTEMPTS:2}

# Razorpay
app.razorpay.key-id=${APP_RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${APP_RAZORPAY_KEY_SECRET:}
app.razorpay.webhook-secret=${APP_RAZORPAY_WEBHOOK_SECRET:}
app.razorpay.checkout-base-url=${APP_RAZORPAY_CHECKOUT_BASE_URL:http://localhost:5173/checkout/razorpay}
