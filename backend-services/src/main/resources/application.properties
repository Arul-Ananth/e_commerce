spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ecommerce_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# CORS (comma-separated list)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Media
app.media.upload-dir=${APP_MEDIA_UPLOAD_DIR:C:/Dev/e_commerce/imageResource/}
app.media.resource-location=${APP_MEDIA_RESOURCE_LOCATION:file:///C:/Dev/e_commerce/imageResource/}
app.media.public-base-url=${APP_MEDIA_PUBLIC_BASE_URL:http://localhost:8080/images/}
app.media.max-upload-bytes=${APP_MEDIA_MAX_UPLOAD_BYTES:5242880}
